<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="820" fill="#0D1117" rx="16"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="bold" fill="#00FFCC">🛡️ Threat Detection Dashboard — Architecture</text>
  <line x1="100" y1="56" x2="1100" y2="56" stroke="#30363D" stroke-width="1.5"/>

  <!-- ── ROW 1: USER ── -->
  <rect x="510" y="75" width="180" height="64" rx="10" fill="#161B22" stroke="#00FFCC" stroke-width="2"/>
  <text x="600" y="101" text-anchor="middle" font-size="13" font-weight="bold" fill="#00FFCC">👤 Security Analyst</text>
  <text x="600" y="120" text-anchor="middle" font-size="11" fill="#8B949E">(Operator / Admin)</text>

  <!-- Arrow down -->
  <line x1="600" y1="139" x2="600" y2="168" stroke="#00FFCC" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <!-- ── ROW 2: STREAMLIT DASHBOARD ── -->
  <rect x="360" y="170" width="480" height="72" rx="10" fill="#161B22" stroke="#3FB950" stroke-width="2"/>
  <text x="600" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#3FB950">🖥️ Streamlit Dashboard (Presentation Layer)</text>
  <text x="600" y="214" text-anchor="middle" font-size="11" fill="#8B949E">Login Auth  ·  Threat Volume Slider  ·  Initiate Scan Button</text>
  <text x="600" y="231" text-anchor="middle" font-size="11" fill="#8B949E">5 Tabs: Threat Map · Analytics · IP Reputation · Alert Log · Export</text>

  <!-- Arrow down center -->
  <line x1="600" y1="242" x2="600" y2="270" stroke="#3FB950" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ── ROW 3: PYTHON ENGINE ── -->
  <rect x="320" y="272" width="560" height="72" rx="10" fill="#161B22" stroke="#E3B341" stroke-width="2"/>
  <text x="600" y="298" text-anchor="middle" font-size="13" font-weight="bold" fill="#E3B341">⚙️ Python Logic Engine (Application Layer)</text>
  <text x="600" y="316" text-anchor="middle" font-size="11" fill="#8B949E">mock_threats.py  ·  threat_classifier.py  ·  ip_reputation.py</text>
  <text x="600" y="333" text-anchor="middle" font-size="11" fill="#8B949E">MITRE ATT&amp;CK Mapper  ·  Severity Adjuster  ·  Summary Aggregator</text>

  <!-- Arrows from engine to 4 boxes below -->
  <!-- Left: Mock/Azure Feed -->
  <line x1="420" y1="344" x2="160" y2="410" stroke="#E3B341" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <!-- Center-left: Threat Classifier -->
  <line x1="530" y1="344" x2="430" y2="410" stroke="#E3B341" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <!-- Center-right: AbuseIPDB -->
  <line x1="670" y1="344" x2="770" y2="410" stroke="#E3B341" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <!-- Right: SQLite -->
  <line x1="780" y1="344" x2="1040" y2="410" stroke="#E3B341" stroke-width="2" marker-end="url(#arrow-yellow)"/>

  <!-- ── ROW 4: 4 BOXES ── -->

  <!-- Box 1: Mock/Azure Feed -->
  <rect x="30" y="412" width="250" height="72" rx="10" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="155" y="436" text-anchor="middle" font-size="13" font-weight="bold" fill="#58A6FF">📡 Threat Feed</text>
  <text x="155" y="454" text-anchor="middle" font-size="11" fill="#8B949E">Mock Threat Generator</text>
  <text x="155" y="470" text-anchor="middle" font-size="11" fill="#8B949E">50–200 threats/scan · 8 attack types</text>

  <!-- Box 2: Threat Classifier -->
  <rect x="300" y="412" width="250" height="72" rx="10" fill="#161B22" stroke="#BC8CFF" stroke-width="2"/>
  <text x="425" y="436" text-anchor="middle" font-size="13" font-weight="bold" fill="#BC8CFF">🧠 Threat Classifier</text>
  <text x="425" y="454" text-anchor="middle" font-size="11" fill="#8B949E">MITRE ATT&amp;CK Mapping</text>
  <text x="425" y="470" text-anchor="middle" font-size="11" fill="#8B949E">Severity Adjuster · Summary Stats</text>

  <!-- Box 3: AbuseIPDB -->
  <rect x="650" y="412" width="250" height="72" rx="10" fill="#161B22" stroke="#F78166" stroke-width="2"/>
  <text x="775" y="436" text-anchor="middle" font-size="13" font-weight="bold" fill="#F78166">🌐 AbuseIPDB API</text>
  <text x="775" y="454" text-anchor="middle" font-size="11" fill="#8B949E">Real-time IP Reputation</text>
  <text x="775" y="470" text-anchor="middle" font-size="11" fill="#8B949E">Abuse Score · ISP · Country</text>

  <!-- Box 4: SQLite -->
  <rect x="920" y="412" width="250" height="72" rx="10" fill="#161B22" stroke="#BC8CFF" stroke-width="2"/>
  <text x="1045" y="436" text-anchor="middle" font-size="13" font-weight="bold" fill="#BC8CFF">🗄️ SQLite Database</text>
  <text x="1045" y="454" text-anchor="middle" font-size="11" fill="#8B949E">threat_scans · threat_events</text>
  <text x="1045" y="470" text-anchor="middle" font-size="11" fill="#8B949E">Historical Trends · Audit Trail</text>

  <!-- Arrows from Row 4 down to Row 5 -->
  <!-- Feed → Threat Map -->
  <line x1="155" y1="484" x2="155" y2="540" stroke="#58A6FF" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Classifier → Alert Log -->
  <line x1="425" y1="484" x2="425" y2="540" stroke="#BC8CFF" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <!-- AbuseIPDB → IP Reputation Tab -->
  <line x1="775" y1="484" x2="775" y2="540" stroke="#F78166" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <!-- SQLite → Analytics -->
  <line x1="1045" y1="484" x2="1045" y2="540" stroke="#BC8CFF" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ── ROW 5: DASHBOARD TABS ── -->

  <!-- Tab 1: Threat Map -->
  <rect x="30" y="542" width="250" height="80" rx="8" fill="#0D1117" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="155" y="566" text-anchor="middle" font-size="20">🌍</text>
  <text x="155" y="584" text-anchor="middle" font-size="11" font-weight="bold" fill="#58A6FF">THREAT MAP Tab</text>
  <text x="155" y="600" text-anchor="middle" font-size="10" fill="#8B949E">Folium Dark Map</text>
  <text x="155" y="614" text-anchor="middle" font-size="10" fill="#8B949E">Color-coded CircleMarkers</text>

  <!-- Tab 2: Analytics -->
  <rect x="300" y="542" width="250" height="80" rx="8" fill="#0D1117" stroke="#BC8CFF" stroke-width="1.5"/>
  <text x="425" y="566" text-anchor="middle" font-size="20">📊</text>
  <text x="425" y="584" text-anchor="middle" font-size="11" font-weight="bold" fill="#BC8CFF">ANALYTICS Tab</text>
  <text x="425" y="600" text-anchor="middle" font-size="10" fill="#8B949E">Donut · Bar · Country · Trend</text>
  <text x="425" y="614" text-anchor="middle" font-size="10" fill="#8B949E">Plotly Interactive Charts</text>

  <!-- Tab 3: IP Reputation -->
  <rect x="570" y="542" width="250" height="80" rx="8" fill="#0D1117" stroke="#F78166" stroke-width="1.5"/>
  <text x="695" y="566" text-anchor="middle" font-size="20">🔍</text>
  <text x="695" y="584" text-anchor="middle" font-size="11" font-weight="bold" fill="#F78166">IP REPUTATION Tab</text>
  <text x="695" y="600" text-anchor="middle" font-size="10" fill="#8B949E">Live IP Scan · Abuse Score</text>
  <text x="695" y="614" text-anchor="middle" font-size="10" fill="#8B949E">Quick Scan Buttons</text>

  <!-- Tab 4: Alert Log -->
  <rect x="840" y="542" width="250" height="80" rx="8" fill="#0D1117" stroke="#E3B341" stroke-width="1.5"/>
  <text x="965" y="566" text-anchor="middle" font-size="20">📋</text>
  <text x="965" y="584" text-anchor="middle" font-size="11" font-weight="bold" fill="#E3B341">ALERT LOG Tab</text>
  <text x="965" y="600" text-anchor="middle" font-size="10" fill="#8B949E">Severity · Type · Status Filters</text>
  <text x="965" y="614" text-anchor="middle" font-size="10" fill="#8B949E">MITRE ID · Color-coded Table</text>

  <!-- AbuseIPDB also goes to IP Reputation tab -->
  <line x1="775" y1="542" x2="720" y2="542" stroke="#F78166" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- SQLite also goes to Alert Log -->
  <line x1="1045" y1="542" x2="1090" y2="542" stroke="#BC8CFF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1090" y1="542" x2="1090" y2="560" stroke="#BC8CFF" stroke-width="1.5"/>
  <line x1="1090" y1="560" x2="1090" y2="560" stroke="#BC8CFF" stroke-width="1.5"/>

  <!-- ── ROW 6: OUTPUT ── -->
  <!-- Arrow from engine to outputs -->
  <line x1="600" y1="344" x2="600" y2="680" stroke="#3FB950" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="600" y1="680" x2="390" y2="680" stroke="#3FB950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="600" y1="680" x2="810" y2="680" stroke="#3FB950" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- PDF -->
  <rect x="150" y="682" width="220" height="65" rx="8" fill="#0D1117" stroke="#3FB950" stroke-width="1.5"/>
  <text x="260" y="706" text-anchor="middle" font-size="20">📄</text>
  <text x="260" y="724" text-anchor="middle" font-size="11" font-weight="bold" fill="#3FB950">PDF Report (FPDF2)</text>
  <text x="260" y="739" text-anchor="middle" font-size="10" fill="#8B949E">Auto-generated after every scan</text>

  <!-- CSV + JSON -->
  <rect x="820" y="682" width="220" height="65" rx="8" fill="#0D1117" stroke="#3FB950" stroke-width="1.5"/>
  <text x="930" y="706" text-anchor="middle" font-size="20">📊</text>
  <text x="930" y="724" text-anchor="middle" font-size="11" font-weight="bold" fill="#3FB950">CSV + JSON Export</text>
  <text x="930" y="739" text-anchor="middle" font-size="10" fill="#8B949E">One-click download via Export Tab</text>

  <!-- ── LEGEND ── -->
  <rect x="390" y="660" width="420" height="130" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <text x="600" y="680" text-anchor="middle" font-size="12" font-weight="bold" fill="#8B949E">LEGEND</text>

  <rect x="410" y="690" width="12" height="12" rx="2" fill="#3FB950"/>
  <text x="428" y="701" font-size="11" fill="#C9D1D9">Presentation Layer (Streamlit)</text>

  <rect x="410" y="710" width="12" height="12" rx="2" fill="#E3B341"/>
  <text x="428" y="721" font-size="11" fill="#C9D1D9">Application Layer (Python)</text>

  <rect x="410" y="730" width="12" height="12" rx="2" fill="#BC8CFF"/>
  <text x="428" y="741" font-size="11" fill="#C9D1D9">Data / Classification Layer</text>

  <rect x="570" y="690" width="12" height="12" rx="2" fill="#58A6FF"/>
  <text x="588" y="701" font-size="11" fill="#C9D1D9">Threat Feed (Mock/Azure)</text>

  <rect x="570" y="710" width="12" height="12" rx="2" fill="#F78166"/>
  <text x="588" y="721" font-size="11" fill="#C9D1D9">External Threat Intelligence</text>

  <rect x="570" y="730" width="12" height="12" rx="2" fill="#3FB950"/>
  <text x="588" y="741" font-size="11" fill="#C9D1D9">Output / Export Layer</text>

  <!-- Footer -->
  <text x="600" y="800" text-anchor="middle" font-size="10" fill="#484F58">Threat Detection Dashboard  ·  Sushanth Banuka  ·  Malla Reddy University  ·  2026</text>

  <!-- ARROW MARKERS -->
  <defs>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00FFCC"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3FB950"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E3B341"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58A6FF"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#BC8CFF"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F78166"/>
    </marker>
  </defs>

</svg>
